        * { margin: 0; padding: 0; box-sizing: border-box; }

            color: #1a1a2e;
        }

        /* ── Top nav ── */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar h1 { font-size: 1.1rem; color: #0077b6; }
        .topbar-right { display: flex; align-items: center; gap: 1rem; }
        .topbar .btn-logout {
            background: none; border: 1px solid #ddd; border-radius: 8px;
            padding: 0.4rem 1rem; font-size: 0.8rem; cursor: pointer; color: #666;
        }
        .topbar .btn-logout:hover { background: #f0f0f0; }

        /* ── Filters ── */
        .filters {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 1rem 2rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .filter-btn:hover { border-color: #0077b6; color: #0077b6; }
        .filter-btn.active { background: #0077b6; color: #fff; border-color: #0077b6; }

        /* ── Summary strip ── */
        .summary-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            padding: 1.5rem 2rem;
        }
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid #e8ecf0;
        }
        .stat-card .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; margin-top: 0.25rem; }
        .stat-card .sub { font-size: 0.8rem; color: #aaa; margin-top: 0.15rem; }

        /* ── Campaign sections ── */
        .campaigns { padding: 0 2rem 3rem; }

        .campaign-section { margin-bottom: 2.5rem; }

            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .campaign-header h2 { font-size: 1.2rem; color: #1a1a2e; }
        .audience-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;

        .audience-badge.male-40 { background: #e3f2fd; color: #1565c0; }
        .audience-badge.adult-learner { background: #f3e5f5; color: #7b1fa2; }
        .audience-badge.male-under40 { background: #e8f5e9; color: #2e7d32; }
        .audience-badge.high-perf { background: #fff3e0; color: #e65100; }
        .audience-badge.cold-water { background: #e0f7fa; color: #00838f; }
        .audience-badge.broad { background: #f5f5f5; color: #555; }
        .landing-page { font-size: 0.8rem; color: #0077b6; text-decoration: none; }
        .landing-page:hover { text-decoration: underline; }
        .targeting-note { font-size: 0.75rem; color: #888; margin-top: 0.25rem; margin-bottom: 0.75rem; }

        /* ── Creatives grid ── */
        .creatives-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }

        .creative-card {
            background: #fff;
            border-radius: 14px;
            border: 1px solid #e8ecf0;
            overflow: hidden;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .creative-card:hover {
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        .creative-media {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #0a0a1a;
            overflow: hidden;
        }
        .creative-media iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .creative-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;

        .media-placeholder .text { font-size: 0.75rem; text-align: center; padding: 0 1rem; }

            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            z-index: 2;
            pointer-events: none;
        }

        .media-type-badge.static { background: rgba(255, 255, 255, 0.9); color: #333; }

        .creative-number {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 2;
            pointer-events: none;
        }

        .file-name {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 0.25rem;
            font-family: 'SF Mono', Monaco, monospace;
        }

        .creative-body { padding: 1.25rem; }
        .creative-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        .ad-copy {
            font-size: 0.82rem;
            color: #555;
            line-height: 1.6;
            max-height: 100px;
            overflow: hidden;
            position: relative;
        }
        .ad-copy.expanded { max-height: none; }
        .ad-copy-fade {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 40px;
            background: linear-gradient(transparent, #fff);
        }
        .ad-copy.expanded .ad-copy-fade { display: none; }
        .toggle-copy {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.78rem;
            color: #0077b6;
            cursor: pointer;
            font-weight: 500;
        }
        .toggle-copy:hover { text-decoration: underline; }

        .drive-link {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.72rem;
            color: #888;
            text-decoration: none;
        }
        .drive-link:hover { color: #0077b6; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .topbar, .filters, .summary-strip, .campaigns { padding-left: 1rem; padding-right: 1rem; }
            .creatives-grid { grid-template-columns: 1fr; }
            .summary-strip { grid-template-columns: repeat(2, 1fr); }
        }
    </style>

        campaigns.forEach(camp => {
            if (filter && filter !== 'all' && filter !== 'video' && filter !== 'static') {
                if (camp.filterTag !== filter) return;
            }

            let creatives = camp.creatives;
            if (filter === 'video') creatives = creatives.filter(c => c.type === 'video');
            if (filter === 'static') creatives = creatives.filter(c => c.type === 'static');
            if (creatives.length === 0) return;

            const section = document.createElement('div');
            section.className = 'campaign-section';

            const targetNote = camp.targetingNote
                ? `<div class="targeting-note">${camp.targetingNote}</div>` : '';

            section.innerHTML = `
                <div class="campaign-header">
                    <h2>${camp.name}</h2>
                    <span class="audience-badge ${camp.audienceClass}">${camp.audience}</span>
                    <a class="landing-page" href="https://${camp.landingPage}" target="_blank">${camp.landingPage} &nearr;</a>
                </div>
                ${targetNote}
                <div class="creatives-grid">
                    ${creatives.map((cr, i) => renderCard(cr, camp, i)).join('')}
                </div>
            `;
            container.appendChild(section);
        });
    }

    function renderCard(creative, campaign, index) {
        const isVideo = creative.type === 'video';
        const badge = isVideo
            ? '<span class="media-type-badge video">Video</span>'
            : '<span class="media-type-badge static">Static</span>';

        let mediaHTML;
        if (creative.driveId) {
            if (isVideo) {
                mediaHTML = `<iframe src="https://drive.google.com/file/d/${creative.driveId}/preview" allow="autoplay" loading="lazy"></iframe>`;
            } else {
                mediaHTML = `<img src="https://lh3.googleusercontent.com/d/${creative.driveId}" alt="${creative.label}" loading="lazy">`;
            }
        } else {
            const icon = isVideo ? '\u{1F3AC}' : '\u{1F5BC}\uFE0F';
            mediaHTML = `<div class="media-placeholder"><div class="icon">${icon}</div><div class="text">${creative.label}<br>Asset not yet linked</div></div>`;
        }

        const fileName = creative.file
            ? `<div class="file-name">${creative.file}</div>` : '';

        const driveLink = creative.driveId
            ? `<a class="drive-link" href="https://drive.google.com/file/d/${creative.driveId}/view" target="_blank">Open in Drive &nearr;</a>` : '';

        const copySection = index === 0 ? `
            <div class="ad-copy" id="copy-${campaign.id}">
                ${campaign.adCopy.replace(/\n/g, '<br>')}
                <div class="ad-copy-fade"></div>
            </div>
            <span class="toggle-copy" onclick="toggleCopy('${campaign.id}')">Show full ad copy</span>
        ` : '';

        return `
            <div class="creative-card" data-type="${creative.type}">
                <div class="creative-media">
                    ${mediaHTML}
                    ${badge}
                    <span class="creative-number">${campaign.id.toUpperCase()}-${index + 1}</span>
                </div>
                <div class="creative-body">
                    <div class="creative-title">${creative.label}</div>
                    ${fileName}
                    ${driveLink}
                    ${copySection}
                </div>
            </div>
        `;
    }

    function toggleCopy(id) {
        const el = document.getElementById('copy-' + id);
        const btn = el.nextElementSibling;
        el.classList.toggle('expanded');
        btn.textContent = el.classList.contains('expanded') ? 'Show less' : 'Show full ad copy';
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(btn.dataset.filter);
        });
    });

    render('all');
    </script>
</body>
</html>
