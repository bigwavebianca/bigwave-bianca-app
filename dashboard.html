<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
        }

        /* ── Top nav ── */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar h1 { font-size: 1.1rem; color: #0077b6; }
        .topbar-right { display: flex; align-items: center; gap: 1rem; }
        .topbar .btn-logout {
            background: none; border: 1px solid #ddd; border-radius: 8px;
            padding: 0.4rem 1rem; font-size: 0.8rem; cursor: pointer; color: #666;
        }
        .topbar .btn-logout:hover { background: #f0f0f0; }

        /* ── Filters ── */
        .filters {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 1rem 2rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .filter-btn:hover { border-color: #0077b6; color: #0077b6; }
        .filter-btn.active { background: #0077b6; color: #fff; border-color: #0077b6; }

        /* ── Summary strip ── */
        .summary-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            padding: 1.5rem 2rem;
        }
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid #e8ecf0;
        }
        .stat-card .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; margin-top: 0.25rem; }
        .stat-card .sub { font-size: 0.8rem; color: #aaa; margin-top: 0.15rem; }

        /* ── Campaign sections ── */
        .campaigns { padding: 0 2rem 3rem; }

        .campaign-section {
            margin-bottom: 2.5rem;
        }
        .campaign-header {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .campaign-header h2 {
            font-size: 1.2rem;
            color: #1a1a2e;
        }
        .audience-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .audience-badge.female { background: #fce4ec; color: #c62828; }
        .audience-badge.male-40 { background: #e3f2fd; color: #1565c0; }
        .audience-badge.adult-learner { background: #f3e5f5; color: #7b1fa2; }
        .audience-badge.male-under40 { background: #e8f5e9; color: #2e7d32; }
        .audience-badge.high-perf { background: #fff3e0; color: #e65100; }
        .audience-badge.cold-water { background: #e0f7fa; color: #00838f; }
        .audience-badge.broad { background: #f5f5f5; color: #555; }
        .landing-page {
            font-size: 0.8rem;
            color: #0077b6;
            text-decoration: none;
        }
        .landing-page:hover { text-decoration: underline; }

        /* ── Creatives grid ── */
        .creatives-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
        }

        .creative-card {
            background: #fff;
            border-radius: 14px;
            border: 1px solid #e8ecf0;
            overflow: hidden;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .creative-card:hover {
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        /* Media area */
        .creative-media {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .creative-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .creative-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255,255,255,0.5);

            top: 0.75rem;
            left: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .media-type-badge.static { background: rgba(255, 255, 255, 0.9); color: #333; }

        .creative-number {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Card body */
        .creative-body {
            padding: 1.25rem;
        }
        .creative-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }
        .ad-copy {
            font-size: 0.82rem;
            color: #555;
            line-height: 1.6;
            max-height: 100px;
            overflow: hidden;
            position: relative;
        }
        .ad-copy.expanded { max-height: none; }
        .ad-copy-fade {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 40px;
            background: linear-gradient(transparent, #fff);
        }
        .ad-copy.expanded .ad-copy-fade { display: none; }
        .toggle-copy {

            margin-top: 0.5rem;
            font-size: 0.78rem;
            color: #0077b6;
            cursor: pointer;
            font-weight: 500;
        }
        .toggle-copy:hover { text-decoration: underline; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .topbar, .filters, .summary-strip, .campaigns { padding-left: 1rem; padding-right: 1rem; }
            .creatives-grid { grid-template-columns: 1fr; }
            .summary-strip { grid-template-columns: repeat(2, 1fr); }
        }
    </style>

    // ── Render ──
    function render(filter) {
        const container = document.getElementById('campaigns');
        container.innerHTML = '';

        campaigns.forEach(camp => {
            // Filter by audience
            if (filter && filter !== 'all' && filter !== 'video' && filter !== 'static') {
                if (camp.filterTag !== filter) return;
            }

            // Filter by media type
            let creatives = camp.creatives;
            if (filter === 'video') creatives = creatives.filter(c => c.type === 'video');
            if (filter === 'static') creatives = creatives.filter(c => c.type === 'static');
            if (creatives.length === 0) return;

            const section = document.createElement('div');
            section.className = 'campaign-section';
            section.setAttribute('data-campaign', camp.id);

            const targetNote = camp.targetingNote
                ? `<div style="font-size:0.75rem;color:#888;margin-top:0.25rem;">${camp.targetingNote}</div>`
                : '';

            section.innerHTML = `
                <div class="campaign-header">
                    <h2>${camp.name}</h2>
                    <span class="audience-badge ${camp.audienceClass}">${camp.audience}</span>
                    <a class="landing-page" href="https://${camp.landingPage}" target="_blank">${camp.landingPage} &nearr;</a>
                </div>
                ${targetNote}
                <div class="creatives-grid">
                    ${creatives.map((cr, i) => renderCreativeCard(cr, camp, i)).join('')}
                </div>
            `;
            container.appendChild(section);
        });
    }

    function renderCreativeCard(creative, campaign, index) {
        const isVideo = creative.type === 'video';
        const mediaTypeBadge = isVideo
            ? '<span class="media-type-badge video">Video</span>'
            : '<span class="media-type-badge static">Static</span>';

        const icon = isVideo ? '\u{1F3AC}' : '\u{1F5BC}\uFE0F';
        const desc = creative.description ? `<div class="text">${creative.description}</div>` : '';

        // Placeholder media — swap these with real URLs when available
        const mediaContent = `
            <div class="media-placeholder">
                <div class="icon">${icon}</div>
                <div class="text">${creative.label}</div>
                ${desc}
            </div>
        `;

        // Only show ad copy on first creative of each campaign
        const copySection = index === 0 ? `
            <div class="ad-copy" id="copy-${campaign.id}">
                ${campaign.adCopy.replace(/\n/g, '<br>')}
                <div class="ad-copy-fade"></div>
            </div>
            <span class="toggle-copy" onclick="toggleCopy('${campaign.id}')">Show more</span>
        ` : '';

        return `
            <div class="creative-card" data-type="${creative.type}">
                <div class="creative-media">
                    ${mediaContent}
                    ${mediaTypeBadge}
                    <span class="creative-number">${campaign.id.toUpperCase()}-${index + 1}</span>
                </div>
                <div class="creative-body">
                    <div class="creative-title">${creative.label}</div>
                    ${copySection}
                </div>
            </div>
        `;
    }

    function toggleCopy(id) {
        const el = document.getElementById('copy-' + id);
        const btn = el.nextElementSibling;
        el.classList.toggle('expanded');
        btn.textContent = el.classList.contains('expanded') ? 'Show less' : 'Show more';
    }

    // ── Filters ──
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(btn.dataset.filter);
        });
    });
