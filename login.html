<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Bigwave Bianca</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0077b6, #00b4d8, #90e0ef);
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 3rem;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .login-card h1 {
            font-size: 1.5rem;
            color: #1a1a2e;
            margin-bottom: 0.25rem;
        }
        .login-card p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 1.25rem;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus { border-color: #0077b6; }
        button {
            width: 100%;
            padding: 0.85rem;
            background: #0077b6;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #005f8a; }
        .error {
            color: #e63946;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            text-align: center;
            display: none;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #0077b6;
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Dashboard Login</h1>
        <p>Bigwave Bianca — Internal</p>
        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" required>
            <button type="submit">Sign In</button>
            <div class="error" id="error">Invalid username or password.</div>
        </form>
        <a href="/" class="back-link">&larr; Back to site</a>
    </div>
    <script>
        // Simple client-side auth — sufficient for personal use
        // Username: bianca / Password: bigwave2026
        const VALID_USER_HASH = '9c00db5e82c3e37c1a3e1b4f0e3c4d8a7b6f5e2d1c0a9b8e7f6d5c4a3b2e1d0';

        async function sha256(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const hash = await sha256(user + ':' + pass);

            if (user === 'bianca' && pass === 'bigwave2026') {
                sessionStorage.setItem('bb_auth', hash);
                sessionStorage.setItem('bb_auth_time', Date.now().toString());
                window.location.href = '/dashboard.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });

        // If already logged in, redirect
        if (sessionStorage.getItem('bb_auth')) {
            const authTime = parseInt(sessionStorage.getItem('bb_auth_time') || '0');
            if (Date.now() - authTime < 24 * 60 * 60 * 1000) {
                window.location.href = '/dashboard.html';
            }
        }
    </script>
</body>
</html>
